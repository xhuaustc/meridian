name: Release

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: Target platform to build
        required: true
        type: choice
        default: all
        options:
          - all
          - default
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - x86_64-unknown-linux-gnu
          - x86_64-pc-windows-msvc

permissions:
  contents: write

env:
  NGINX_VERSION: '1.26.2'
  OPENSSL_VERSION: '3.3.2'
  ZLIB_VERSION: '1.3.1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.matrix.outputs.include }}
    steps:
      - name: Select build targets
        id: matrix
        shell: bash
        run: |
          default_matrix='[{"os":"macos-latest","rust-target":"aarch64-apple-darwin","tauri-args":"--target aarch64-apple-darwin"},{"os":"windows-latest","rust-target":"x86_64-pc-windows-msvc","tauri-args":""}]'
          all_matrix='[{"os":"macos-latest","rust-target":"aarch64-apple-darwin","tauri-args":"--target aarch64-apple-darwin"},{"os":"macos-latest","rust-target":"x86_64-apple-darwin","tauri-args":"--target x86_64-apple-darwin"},{"os":"ubuntu-22.04","rust-target":"x86_64-unknown-linux-gnu","tauri-args":""},{"os":"windows-latest","rust-target":"x86_64-pc-windows-msvc","tauri-args":""}]'

          case "${{ github.event_name }}:${{ inputs.target || 'default' }}" in
            workflow_dispatch:all)
              matrix="$all_matrix"
              ;;
            workflow_dispatch:aarch64-apple-darwin)
              matrix='[{"os":"macos-latest","rust-target":"aarch64-apple-darwin","tauri-args":"--target aarch64-apple-darwin"}]'
              ;;
            workflow_dispatch:x86_64-apple-darwin)
              matrix='[{"os":"macos-latest","rust-target":"x86_64-apple-darwin","tauri-args":"--target x86_64-apple-darwin"}]'
              ;;
            workflow_dispatch:x86_64-unknown-linux-gnu)
              matrix='[{"os":"ubuntu-22.04","rust-target":"x86_64-unknown-linux-gnu","tauri-args":""}]'
              ;;
            workflow_dispatch:x86_64-pc-windows-msvc)
              matrix='[{"os":"windows-latest","rust-target":"x86_64-pc-windows-msvc","tauri-args":""}]'
              ;;
            *)
              matrix="$default_matrix"
              ;;
          esac

          echo "include=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.include) }}

    runs-on: ${{ matrix.os }}
    environment: RELEASE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Linux: install system dependencies for Tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      # --- Prepare nginx sidecar ---

      # macOS / Linux: compile nginx from source
      - name: Build nginx sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./scripts/prepare-nginx.sh
          FORCE_REBUILD=1 ./scripts/prepare-nginx.sh ${{ matrix.rust-target }}

      # Windows: download official pre-built binary
      - name: Build nginx sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\prepare-nginx.ps1 -NginxVersion $env:NGINX_VERSION -Target ${{ matrix.rust-target }} -ForceRebuild

      - name: Verify nginx sidecar
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ls -lh src-tauri/binaries/nginx-${{ matrix.rust-target }}.exe
          else
            ls -lh src-tauri/binaries/nginx-${{ matrix.rust-target }}
          fi

      # --- Build Tauri app ---

      # macOS: import Apple certificate for code signing
      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Meridian ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installer for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
