<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.35)"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle inner shadow -->
  <rect width="512" height="512" rx="108" ry="108" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>

  <!-- Three flowing lines representing data streams / routing paths -->
  <!-- Top stream -->
  <path d="M 96 180 C 170 180, 190 140, 256 140 C 322 140, 342 180, 416 180"
        stroke="url(#wave1)" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Middle stream (main, thicker) -->
  <path d="M 96 256 C 170 256, 190 216, 256 216 C 322 216, 342 296, 416 296"
        stroke="url(#wave1)" stroke-width="32" stroke-linecap="round" fill="none"/>

  <!-- Bottom stream -->
  <path d="M 96 332 C 170 332, 190 372, 256 372 C 322 372, 342 332, 416 332"
        stroke="url(#wave2)" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Entry dots (left side) -->
  <circle cx="88" cy="180" r="12" fill="url(#dot)"/>
  <circle cx="88" cy="256" r="14" fill="white" opacity="0.95"/>
  <circle cx="88" cy="332" r="12" fill="url(#dot)"/>

  <!-- Exit dots (right side) -->
  <circle cx="424" cy="180" r="12" fill="url(#dot)"/>
  <circle cx="424" cy="296" r="14" fill="white" opacity="0.95"/>
  <circle cx="424" cy="332" r="12" fill="url(#dot)"/>
</svg>
